version: '3.8'

services:
  lead-scraper:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - MAX_CONCURRENT_JOBS=2
      - USE_PROXY=false
      # - PROXY_URL=http://user:pass@host:port
      - SCRAPER_API_KEY=production-secret-123
    volumes:
      - lead-data:/home/node/app/data
    restart: always

volumes:
  lead-data:
